          - paragraph [ref=e45]:
            - text: "This ratio tells an important story:"
            - strong [ref=e46]: the public repository is primarily a release artifact surface
            - text: ", not where day-to-day feature development happens. The real engineering work ships through the closed-source core, and the public repo reflects it via automated changelog updates and plugin changes."
          - heading "Most Changed Files" [level=3] [ref=e47]
          - paragraph [ref=e48]: "Only two files were modified across all 14 commits:"
          - list [ref=e49]:
            - listitem [ref=e50]:
              - strong [ref=e51]: CHANGELOG.md
              - text: (12 changes) -- Updated automatically with every release.
            - listitem [ref=e52]:
              - strong [ref=e53]: plugins/code-review/commands/code-review.md
              - text: (1 change) -- Manual feature work on the code-review plugin.
          - paragraph [ref=e54]: This minimal footprint is typical of repositories that serve as a public interface to a larger private codebase.
          - separator [ref=e56]
          - heading "New Capabilities (Feature Commits)" [level=2] [ref=e57]
          - 'heading "Code-Review Plugin: Confirmed Inline Comments" [level=3] [ref=e58]'
          - paragraph [ref=e59]:
            - strong [ref=e60]: "Commit:"
            - code [ref=e61]: db8834b
            - text: "--"
            - code [ref=e62]: "feat(code-review): pass confirmed=true when posting inline comments"
            - strong [ref=e63]: "Author:"
            - text: Kashyap Murali
            - strong [ref=e64]: "Merged via:"
            - text: "PR #33472 (March 12, 2026)"
          - paragraph [ref=e65]: This is the only manual feature commit in the two-week window. Here is what it means and why it matters.
          - heading "What Is the Code-Review Plugin?" [level=4] [ref=e66]
          - paragraph [ref=e67]:
            - text: Claude Code includes a plugin system that extends its capabilities. The
            - strong [ref=e68]: code-review
            - text: plugin allows Claude to review pull requests and post comments directly on specific lines of code (called "inline comments") in platforms like GitHub.
          - heading "What Changed" [level=4] [ref=e69]
          - paragraph [ref=e70]:
            - text: Previously, when the code-review plugin posted inline comments on a PR, it did not explicitly mark them as "confirmed." This matters because many code review platforms distinguish between
            - strong [ref=e71]: pending
            - text: comments (drafts visible only to the author) and
            - strong [ref=e72]: confirmed
            - text: comments (published and visible to everyone).
          - paragraph [ref=e73]:
            - text: By passing
            - code [ref=e74]: confirmed=true
            - text: ", the plugin now ensures that inline comments are immediately visible to all reviewers and the PR author, rather than sitting in a draft state that might never be submitted."
          - heading "Why This Matters" [level=4] [ref=e75]
          - paragraph [ref=e76]: In a real-world engineering workflow, a code review tool that leaves comments in draft state is almost useless -- the PR author never sees the feedback. This is a small change in code but a significant change in behavior. It is the difference between "Claude reviewed your PR" and "Claude reviewed your PR and you can actually see the results."
          - heading "Lessons for Beginners" [level=4] [ref=e77]
          - paragraph [ref=e78]: "This commit illustrates several professional software engineering patterns:"
          - list [ref=e79]:
            - listitem [ref=e80]:
              - paragraph [ref=e81]:
                - strong [ref=e82]: Conventional commit messages
                - text: "-- The prefix"
                - code [ref=e83]: "feat(code-review):"
                - text: follows the Conventional Commits standard.
                - code [ref=e84]: feat
                - text: means a new feature;
                - code [ref=e85]: (code-review)
                - text: scopes it to a specific module. This convention makes changelogs, release notes, and git history searchable.
            - listitem [ref=e86]:
              - paragraph [ref=e87]:
                - strong [ref=e88]: Small, focused PRs
                - text: "-- Only one file changed. The PR does exactly one thing: add a boolean flag. This makes it easy to review, easy to revert if something breaks, and easy to understand months later."
            - listitem [ref=e89]:
              - paragraph [ref=e90]:
                - strong [ref=e91]: Plugin architecture
                - text: "-- The fact that this change lives in"
                - code [ref=e92]: plugins/code-review/
                - text: rather than the core codebase shows a separation of concerns. Plugins extend functionality without modifying the core product.
          - separator [ref=e93]
          - heading "Release Highlights (v2.1.80 -- v2.1.81)" [level=2] [ref=e94]
          - paragraph [ref=e95]: Although the commits themselves are mostly automated, the CHANGELOG entries reveal a rich picture of what the engineering team shipped. These two releases span roughly one week and contain dozens of changes across multiple areas.
          - heading "v2.1.81 -- Major Themes" [level=3] [ref=e96]
          - heading "New CLI Capabilities" [level=4] [ref=e97]
          - list [ref=e98]:
            - listitem [ref=e99]:
              - paragraph [ref=e100]:
                - strong [ref=e101]:
                  - code [ref=e102]: "--bare"
                  - text: flag for scripted
                  - code [ref=e103]: "-p"
                  - text: calls
                - text: "-- When you run Claude Code non-interactively (e.g.,"
                - code [ref=e104]: claude -p "explain this code"
                - text: ), the
                - code [ref=e105]: "--bare"
                - text: flag strips away decorative output so the result is clean for piping into other tools. This is essential for integrating Claude Code into shell scripts, CI/CD pipelines, and automation workflows.
            - listitem [ref=e106]:
              - paragraph [ref=e107]:
                - strong [ref=e108]:
                  - code [ref=e109]: "--channels"
                  - text: permission relay
                - text: "-- Channels are a way for Claude Code to communicate with external systems. This update allows permission grants to flow through channels, meaning an orchestrating system can approve tool use on behalf of the user."
            - listitem [ref=e110]:
              - paragraph [ref=e111]:
                - strong [ref=e112]:
                  - code [ref=e113]: "!"
                  - text: bash mode discoverability
                - text: "-- In interactive mode, typing"
                - code [ref=e114]: "!"
                - text: lets you drop into a raw bash shell. This update improves how users discover that feature, likely through better prompts or help text.
          - heading "Stability and Bug Fixes" [level=4] [ref=e115]
          - list [ref=e116]:
            - listitem [ref=e117]:
              - paragraph [ref=e118]:
                - strong [ref=e119]: Multiple voice mode fixes
                - text: "-- Voice mode lets you talk to Claude Code instead of typing. Multiple fixes suggest this is an active area of development with rough edges being smoothed out."
            - listitem [ref=e120]:
              - paragraph [ref=e121]:
                - strong [ref=e122]: OAuth concurrent session fix
                - text: "-- When multiple Claude Code sessions share the same OAuth token, race conditions could cause authentication failures. This fix addresses that scenario, which is common in team environments or when running multiple terminal sessions."
            - listitem [ref=e123]:
              - paragraph [ref=e124]:
                - strong [ref=e125]: Node.js 18 crash fix
                - text: "-- Claude Code runs on Node.js. This fix prevents crashes on Node.js version 18 specifically, ensuring broader compatibility. Node.js 18 is an LTS (Long Term Support) release that many enterprises still run."
            - listitem [ref=e126]:
              - paragraph [ref=e127]:
                - strong [ref=e128]:
                  - code [ref=e129]: CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS
                  - text: fix
                - text: "-- Environment variables like this let administrators control which experimental features are active. A bug in how this variable was processed has been corrected."
            - listitem [ref=e130]:
              - paragraph [ref=e131]:
                - strong [ref=e132]: Background agent race condition fix
                - text: "-- Background agents run Claude Code tasks asynchronously. A race condition (where two processes compete and produce unpredictable results) was found and fixed."
          - heading "Plugin and Permission System" [level=4] [ref=e133]
          - list [ref=e134]:
            - listitem [ref=e135]:
              - paragraph [ref=e136]:
                - strong [ref=e137]: Permission prompt fixes for dashed strings
                - text: "-- When a tool name or path contains dashes (e.g.,"
                - code [ref=e138]: my-custom-tool
                - text: ), the permission prompt was not displaying or matching correctly. This is a subtle but important fix for usability.
            - listitem [ref=e139]:
              - paragraph [ref=e140]:
                - strong [ref=e141]: Plugin hook fixes
                - text: "-- Plugins can register \"hooks\" that run at specific points in Claude Code's lifecycle (e.g., before a command runs, after a file is edited). Bugs in hook execution were resolved."
            - listitem [ref=e142]:
              - paragraph [ref=e143]:
                - strong [ref=e144]: Plugin freshness improvements
                - text: "-- Ensures plugins are up-to-date by improving how Claude Code checks for and applies plugin updates."
          - heading "Session Management" [level=4] [ref=e145]
          - list [ref=e146]:
            - listitem [ref=e147]:
              - paragraph [ref=e148]:
                - strong [ref=e149]: Worktree session resumption
                - text: "-- Git worktrees let you check out multiple branches simultaneously in different directories. Claude Code now correctly resumes sessions when working inside a worktree, rather than losing context."
            - listitem [ref=e150]:
              - paragraph [ref=e151]:
                - strong [ref=e152]: MCP tool call collapsing
                - text: "-- MCP (Model Context Protocol) tool calls can generate verbose output. \"Collapsing\" means grouping or summarizing repeated calls so the UI stays readable."
          - heading "v2.1.80 -- Major Themes" [level=3] [ref=e153]
          - heading "Developer Experience" [level=4] [ref=e154]
          - list [ref=e155]:
            - listitem [ref=e156]:
              - paragraph [ref=e157]:
                - strong [ref=e158]:
                  - code [ref=e159]: rate_limits
                  - text: field for statusline scripts
                - text: "-- Statusline scripts display real-time information in the Claude Code UI. This new field exposes API rate limit data so developers can build dashboards or warnings when they are approaching their usage limits."
            - listitem [ref=e160]:
              - paragraph [ref=e161]:
                - strong [ref=e162]: Plugin marketplace inline source
                - text: "-- Plugins can now display their source code inline within the marketplace, improving transparency and trust."
            - listitem [ref=e163]:
              - paragraph [ref=e164]:
                - strong [ref=e165]:
                  - code [ref=e166]: "--channels"
                  - text: research preview
                - text: "-- The initial launch of the channels feature (expanded in v2.1.81). Research preview means it is available for testing but not yet considered stable."
          - heading "Performance" [level=4] [ref=e167]
          - list [ref=e168]:
            - listitem [ref=e169]:
              - paragraph [ref=e170]:
                - strong [ref=e171]: Startup memory reduction (~80MB saved on 250k-file repos)
                - text: "-- When opening a large repository with 250,000+ files, Claude Code was consuming excessive memory at startup. This optimization saves approximately 80 megabytes, which is significant on resource-constrained machines or when running multiple sessions."
              - paragraph [ref=e172]: "To put this in perspective: 80MB may not sound like much, but if you run 5 Claude Code sessions simultaneously (common for polyrepo setups), that is 400MB saved. On a CI runner with 4GB of RAM, that could be the difference between success and an out-of-memory crash."
          - heading "Bug Fixes" [level=4] [ref=e173]
          - list [ref=e174]:
            - listitem [ref=e175]:
              - paragraph [ref=e176]:
                - strong [ref=e177]:
                  - code [ref=e178]: "--resume"
                  - text: parallel tool fix
                - text: "-- When resuming a previous session that had multiple tools running in parallel, the state was not being restored correctly. This fix ensures seamless session recovery."
            - listitem [ref=e179]:
              - paragraph [ref=e180]:
                - strong [ref=e181]: Voice mode WebSocket fix
                - text: "-- Voice mode uses WebSockets for real-time audio streaming. A connection stability issue was resolved."
            - listitem [ref=e182]:
              - paragraph [ref=e183]:
                - strong [ref=e184]: Fine-grained tool streaming fix
                - text: "-- When tools stream their output incrementally (rather than returning all at once), the rendering was incorrect in some edge cases."
          - separator [ref=e186]
          - heading "Patterns and Lessons Learned" [level=2] [ref=e187]
          - heading "1. Automation-Heavy Release Process" [level=3] [ref=e188]
          - paragraph [ref=e189]: "Twelve out of fourteen commits are automated CHANGELOG updates. This tells us:"
          - list [ref=e190]:
            - listitem [ref=e191]:
              - strong [ref=e192]: Releases are frequent
              - text: "-- roughly daily, sometimes multiple times per day. This is a continuous deployment model."
            - listitem [ref=e193]:
              - strong [ref=e194]: The changelog is the source of truth
              - text: for what shipped. If you want to understand Claude Code's evolution, read the CHANGELOG, not the commit history.
            - listitem [ref=e195]:
              - strong [ref=e196]: GitHub Actions drives the release pipeline.
              - text: Every release triggers an automated commit to update the public-facing changelog.
          - heading "2. Stability Is the Top Priority" [level=3] [ref=e197]
          - paragraph [ref=e198]:
            - text: Counting the changelog entries across both releases, bug fixes outnumber new features by roughly 3:1. This is characteristic of a
            - strong [ref=e199]: maturing product
            - text: "-- the team is investing more in reliability, edge case handling, and cross-platform compatibility than in adding new capabilities."
          - heading "3. Plugin System Is a First-Class Citizen" [level=3] [ref=e200]
          - paragraph [ref=e201]: "Multiple changes across both releases touch the plugin system: hook fixes, marketplace improvements, freshness checks, and the code-review plugin enhancement. This signals that Claude Code is designed to be extended through plugins, and the team is actively investing in making that extension surface robust."
          - heading "4. Multi-Session and Multi-Environment Support" [level=3] [ref=e202]
          - paragraph [ref=e203]:
            - text: Fixes for OAuth concurrent sessions, worktree session resumption, and
            - code [ref=e204]: "--resume"
            - text: "parallel tools all point to the same user need:"
            - strong [ref=e205]: running Claude Code in complex, real-world setups
            - text: "-- multiple terminals, multiple branches, CI environments, and team-shared configurations. The product is evolving beyond single-user, single-terminal use."
          - heading "5. Performance at Scale" [level=3] [ref=e206]
          - paragraph [ref=e207]: "The 80MB memory reduction for large repos is not just a nice optimization. It reflects a design philosophy: Claude Code must work on the largest repositories in the industry without degrading the developer's machine. Performance work like this typically requires careful profiling, identifying unnecessary data structures loaded at startup, and deferring or eliminating them."
          - separator [ref=e208]
          - heading "Development Focus Areas at a Glance" [level=2] [ref=e209]
          - separator [ref=e211]
          - heading "Key Takeaways for New Contributors" [level=2] [ref=e212]
          - list [ref=e213]:
            - listitem [ref=e214]:
              - paragraph [ref=e215]:
                - strong [ref=e216]: Read the CHANGELOG first.
                - text: The commit history is mostly automated noise. The CHANGELOG entries are curated and informative.
            - listitem [ref=e217]:
              - paragraph [ref=e218]:
                - strong [ref=e219]: Plugin development is the main entry point.
                - text: If you want to contribute to Claude Code, plugins are the public surface where changes happen. The
                - code [ref=e220]: plugins/
                - text: directory is where your PRs will land.
            - listitem [ref=e221]:
              - paragraph [ref=e222]:
                - strong [ref=e223]: Follow Conventional Commits.
                - text: Every human-authored commit in this window uses the
                - code [ref=e224]: "feat(scope):"
                - text: or
                - code [ref=e225]: "fix(scope):"
                - text: format. Adopt this convention from day one.
            - listitem [ref=e226]:
              - paragraph [ref=e227]:
                - strong [ref=e228]: Small PRs win.
                - text: "PR #33472 changed one file and added one boolean flag. It was reviewed, approved, and merged within a day. Large PRs take longer and carry more risk."
            - listitem [ref=e229]:
              - paragraph [ref=e230]:
                - strong [ref=e231]: Think about edge cases.
                - text: "The majority of fixes in these releases address edge cases: dashed strings, concurrent sessions, Node.js version compatibility, race conditions. Professional software engineering is largely about handling the cases that \"shouldn't happen but do.\""
