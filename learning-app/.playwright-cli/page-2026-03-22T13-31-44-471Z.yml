          - heading "Parallel Subagent Execution" [level=3] [ref=e382]
          - paragraph [ref=e383]:
            - text: One of the most powerful patterns is launching multiple subagents in parallel. The official
            - code [ref=e384]: code-review
            - text: "plugin demonstrates this: it spawns"
            - strong [ref=e385]: five Sonnet subagents
            - text: simultaneously, each reviewing a different aspect of the codebase (logic, performance, security, style, and documentation). The results are collected and merged into a unified report.
          - heading "Activating an Agent as Default" [level=3] [ref=e387]
          - paragraph [ref=e388]:
            - text: If you want your plugin's agent to be the default personality for the entire Claude Code session, use
            - code [ref=e389]: settings.json
            - text: ":"
          - code [ref=e391]: "{ \"agent\": \"security-auditor\" }"
          - paragraph [ref=e392]: This replaces the main Claude Code persona with your agent's system prompt and tool restrictions for the duration of the session.
          - separator [ref=e393]
          - heading "Hooks" [level=2] [ref=e394]
          - paragraph [ref=e395]: Hooks let your plugin react to lifecycle events inside Claude Code. Instead of waiting for the user to invoke a command, hooks fire automatically when specific things happen — a file is written, a tool is called, a prompt is submitted.
          - heading "Lifecycle Events" [level=3] [ref=e396]
          - table [ref=e398]:
            - rowgroup [ref=e399]:
              - row "Event When It Fires Typical Use" [ref=e400]:
                - columnheader "Event" [ref=e401]
                - columnheader "When It Fires" [ref=e402]
                - columnheader "Typical Use" [ref=e403]
            - rowgroup [ref=e404]:
              - row "SessionStart Claude Code session begins Set up environment, check prerequisites" [ref=e405]:
                - cell "SessionStart" [ref=e406]:
                  - code [ref=e407]: SessionStart
                - cell "Claude Code session begins" [ref=e408]
                - cell "Set up environment, check prerequisites" [ref=e409]
              - row "UserPromptSubmit User submits a prompt (before processing) Validate input, inject context" [ref=e410]:
                - cell "UserPromptSubmit" [ref=e411]:
                  - code [ref=e412]: UserPromptSubmit
                - cell "User submits a prompt (before processing)" [ref=e413]
                - cell "Validate input, inject context" [ref=e414]
              - row "PreToolUse Before a tool executes Block dangerous operations, add guardrails" [ref=e415]:
                - cell "PreToolUse" [ref=e416]:
                  - code [ref=e417]: PreToolUse
                - cell "Before a tool executes" [ref=e418]
                - cell "Block dangerous operations, add guardrails" [ref=e419]
              - row "PostToolUse After a tool executes Lint files, run tests, validate output" [ref=e420]:
                - cell "PostToolUse" [ref=e421]:
                  - code [ref=e422]: PostToolUse
                - cell "After a tool executes" [ref=e423]
                - cell "Lint files, run tests, validate output" [ref=e424]
              - row "Notification Claude Code sends a notification Custom alerting, logging" [ref=e425]:
                - cell "Notification" [ref=e426]:
                  - code [ref=e427]: Notification
                - cell "Claude Code sends a notification" [ref=e428]
                - cell "Custom alerting, logging" [ref=e429]
              - row "Stop Main agent finishes Cleanup, final validation" [ref=e430]:
                - cell "Stop" [ref=e431]:
                  - code [ref=e432]: Stop
                - cell "Main agent finishes" [ref=e433]
                - cell "Cleanup, final validation" [ref=e434]
              - row "SubagentStop A subagent finishes Collect results, trigger next phase" [ref=e435]:
                - cell "SubagentStop" [ref=e436]:
                  - code [ref=e437]: SubagentStop
                - cell "A subagent finishes" [ref=e438]
                - cell "Collect results, trigger next phase" [ref=e439]
          - heading "Hook Configuration (hooks/hooks.json)" [level=3] [ref=e440]:
            - text: Hook Configuration (
            - code [ref=e441]: hooks/hooks.json
            - text: )
          - paragraph [ref=e442]:
            - text: All hooks for a plugin are defined in a single
            - code [ref=e443]: hooks/hooks.json
            - text: file.
          - code [ref=e445]: "{ \"hooks\": { \"PostToolUse\": [ { \"matcher\": \"Write|Edit\", \"hooks\": [ { \"type\": \"command\", \"command\": \"jq -r '.tool_input.file_path' | xargs npm run lint:fix\" } ] } ] } }"
          - 'heading "Hook Types: Command vs Prompt" [level=3] [ref=e446]'
          - paragraph [ref=e447]: "There are two fundamentally different ways a hook can respond to an event:"
          - paragraph [ref=e448]:
            - strong [ref=e449]: Command hooks
            - text: run a shell command. They are fast, deterministic, and do not consume AI tokens.
          - code [ref=e451]: "{ \"type\": \"command\", \"command\": \"npm run lint:fix -- $FILE_PATH\" }"
          - paragraph [ref=e452]:
            - strong [ref=e453]: Prompt hooks
            - text: send a prompt to the LLM for evaluation. They are more flexible but slower and token-consuming.
          - code [ref=e455]: "{ \"type\": \"prompt\", \"prompt\": \"Check if the file that was just written follows our coding standards. If not, fix it.\" }"
          - paragraph [ref=e456]:
            - strong [ref=e457]: "When to use each:"
          - table [ref=e459]:
            - rowgroup [ref=e460]:
              - row "Command Hooks Prompt Hooks" [ref=e461]:
                - columnheader "Command Hooks" [ref=e462]
                - columnheader "Prompt Hooks" [ref=e463]
            - rowgroup [ref=e464]:
              - row "Linting and formatting Subjective code quality checks" [ref=e465]:
                - cell "Linting and formatting" [ref=e466]
                - cell "Subjective code quality checks" [ref=e467]
              - row "Running test suites Deciding whether to proceed with an operation" [ref=e468]:
                - cell "Running test suites" [ref=e469]
                - cell "Deciding whether to proceed with an operation" [ref=e470]
              - row "File validation (JSON schema, etc.) Generating follow-up actions based on context" [ref=e471]:
                - cell "File validation (JSON schema, etc.)" [ref=e472]
                - cell "Generating follow-up actions based on context" [ref=e473]
              - row "Logging and metrics Complex conditional logic" [ref=e474]:
                - cell "Logging and metrics" [ref=e475]
                - cell "Complex conditional logic" [ref=e476]
          - heading "Matchers" [level=3] [ref=e477]
          - paragraph [ref=e478]:
            - text: The
            - code [ref=e479]: matcher
            - text: "field filters which tool invocations trigger a hook. It accepts a pipe-separated list of tool names:"
          - list [ref=e480]:
            - listitem [ref=e481]:
              - code [ref=e482]: "\"Write\""
              - text: — only fires when the Write tool is used
            - listitem [ref=e483]:
              - code [ref=e484]: "\"Write|Edit\""
              - text: — fires for Write or Edit
            - listitem [ref=e485]:
              - code [ref=e486]: "\"Bash\""
              - text: — fires whenever a Bash command runs
          - paragraph [ref=e487]:
            - text: Without a matcher, the hook fires for
            - emphasis [ref=e488]: every
            - text: tool use in that lifecycle event.
          - 'heading "Real-World Example: The security-guidance Plugin" [level=3] [ref=e489]':
            - text: "Real-World Example: The"
            - code [ref=e490]: security-guidance
            - text: Plugin
          - paragraph [ref=e491]:
            - text: The official
            - code [ref=e492]: security-guidance
            - text: plugin uses a
            - code [ref=e493]: PreToolUse
            - text: hook that monitors
            - strong [ref=e494]: nine different security patterns
            - text: . Before any tool executes, the hook checks whether the operation might introduce a vulnerability (hardcoded credentials, unsafe deserialization, SQL string concatenation, etc.) and warns the user.
          - 'heading "Real-World Example: The ralph-wiggum Plugin" [level=3] [ref=e495]':
            - text: "Real-World Example: The"
            - code [ref=e496]: ralph-wiggum
            - text: Plugin
          - paragraph [ref=e497]:
            - text: The
            - code [ref=e498]: ralph-wiggum
            - text: plugin uses a
            - code [ref=e499]: Stop
            - text: hook to create iterative AI loops. When the main agent finishes, the hook evaluates the output and decides whether another iteration is needed — effectively creating a self-improving feedback loop.
          - separator [ref=e500]
          - heading "MCP Servers" [level=2] [ref=e501]
          - paragraph [ref=e502]: MCP (Model Context Protocol) is a universal adapter that connects Claude Code to external systems. Each MCP server exposes a set of tools that Claude can call, just like its built-in tools (Read, Write, Bash, etc.).
          - heading "What MCP Enables" [level=3] [ref=e503]
          - paragraph [ref=e505]: "MCP servers can provide access to:"
          - list [ref=e506]:
            - listitem [ref=e507]:
              - strong [ref=e508]: Browser automation
              - text: (Playwright)
            - listitem [ref=e509]:
              - strong [ref=e510]: Databases
              - text: (query and mutate)
            - listitem [ref=e511]:
              - strong [ref=e512]: Third-party APIs
              - text: (Slack, Jira, GitHub, Notion)
            - listitem [ref=e513]:
              - strong [ref=e514]: Custom internal services
          - heading "Configuration (.mcp.json)" [level=3] [ref=e515]:
            - text: Configuration (
            - code [ref=e516]: .mcp.json
            - text: )
          - paragraph [ref=e517]:
            - text: MCP servers are configured in
            - code [ref=e518]: .mcp.json
            - text: at the plugin root.
          - code [ref=e520]: "{ \"mcpServers\": { \"playwright\": { \"command\": \"npx\", \"args\": [\"@playwright/mcp@latest\"] }, \"my-database\": { \"command\": \"node\", \"args\": [\"./mcp-servers/database-server.js\"], \"env\": { \"DATABASE_URL\": \"postgresql://localhost:5432/mydb\" } } } }"
          - paragraph [ref=e521]: "Each key is the server name, and the value specifies:"
          - table [ref=e523]:
            - rowgroup [ref=e524]:
              - row "Field Description" [ref=e525]:
                - columnheader "Field" [ref=e526]
                - columnheader "Description" [ref=e527]
            - rowgroup [ref=e528]:
              - row "command The executable to run (e.g., npx, node, python)" [ref=e529]:
                - cell "command" [ref=e530]:
                  - code [ref=e531]: command
                - cell "The executable to run (e.g., npx, node, python)" [ref=e532]:
                  - text: The executable to run (e.g.,
                  - code [ref=e533]: npx
                  - text: ","
                  - code [ref=e534]: node
                  - text: ","
                  - code [ref=e535]: python
                  - text: )
              - row "args Arguments passed to the command" [ref=e536]:
                - cell "args" [ref=e537]:
                  - code [ref=e538]: args
                - cell "Arguments passed to the command" [ref=e539]
              - row "env Environment variables available to the server process" [ref=e540]:
                - cell "env" [ref=e541]:
                  - code [ref=e542]: env
                - cell "Environment variables available to the server process" [ref=e543]
          - heading "Adding MCP Servers via CLI" [level=3] [ref=e544]
          - paragraph [ref=e545]: "You can also add MCP servers directly from the command line:"
          - code [ref=e547]: claude mcp add playwright npx @playwright/mcp@latest
          - paragraph [ref=e548]:
            - text: This modifies the
            - code [ref=e549]: .mcp.json
            - text: file for you.
          - heading "Token Considerations" [level=3] [ref=e550]
          - paragraph [ref=e551]: Every MCP server adds its tool definitions to Claude's context window. More servers means more tokens consumed before any actual work begins. Be selective — only include servers your plugin genuinely needs.
          - separator [ref=e552]
          - heading "LSP Servers" [level=2] [ref=e553]
          - paragraph [ref=e554]: "LSP (Language Server Protocol) servers provide code intelligence: diagnostics, completions, hover information, and go-to-definition. Plugins can ship LSP server configurations so that Claude Code has language-aware analysis for specific programming languages."
          - heading "Configuration (.lsp.json)" [level=3] [ref=e555]:
            - text: Configuration (
            - code [ref=e556]: .lsp.json
            - text: )
          - code [ref=e558]: "{ \"go\": { \"command\": \"gopls\", \"args\": [\"serve\"], \"extensionToLanguage\": { \".go\": \"go\" } }, \"typescript\": { \"command\": \"typescript-language-server\", \"args\": [\"--stdio\"], \"extensionToLanguage\": { \".ts\": \"typescript\", \".tsx\": \"typescriptreact\" } } }"
          - paragraph [ref=e559]: "Each key is a language identifier. The value specifies:"
          - table [ref=e561]:
            - rowgroup [ref=e562]:
              - row "Field Description" [ref=e563]:
                - columnheader "Field" [ref=e564]
                - columnheader "Description" [ref=e565]
            - rowgroup [ref=e566]:
              - row "command The LSP server executable" [ref=e567]:
                - cell "command" [ref=e568]:
                  - code [ref=e569]: command
                - cell "The LSP server executable" [ref=e570]
              - row "args Arguments to start the server" [ref=e571]:
                - cell "args" [ref=e572]:
                  - code [ref=e573]: args
                - cell "Arguments to start the server" [ref=e574]
              - row "extensionToLanguage Maps file extensions to language IDs the server understands" [ref=e575]:
                - cell "extensionToLanguage" [ref=e576]:
                  - code [ref=e577]: extensionToLanguage
                - cell "Maps file extensions to language IDs the server understands" [ref=e578]
          - heading "When to Use LSP in a Plugin" [level=3] [ref=e579]
          - paragraph [ref=e580]: "Most developers already have LSP servers configured in their editors. A plugin should ship LSP configuration when:"
          - list [ref=e581]:
            - listitem [ref=e582]: The plugin targets a specific language ecosystem and needs richer analysis than file reading provides.
            - listitem [ref=e583]: The target audience may not have the relevant LSP server installed and the plugin can bundle it.
            - listitem [ref=e584]: The plugin's hooks or skills depend on diagnostic information from the LSP.
          - separator [ref=e585]
          - heading "Settings" [level=2] [ref=e586]
          - paragraph [ref=e587]:
            - text: Plugins can ship default settings in a
            - code [ref=e588]: settings.json
            - text: file at the plugin root. Currently, the only supported key is
            - code [ref=e589]: agent
            - text: ", which activates a plugin agent as the main thread personality."
          - heading "Configuration (settings.json)" [level=3] [ref=e590]:
            - text: Configuration (
            - code [ref=e591]: settings.json
            - text: )
          - code [ref=e593]: "{ \"agent\": \"security-reviewer\" }"
          - paragraph [ref=e594]: When this setting is active, the specified agent's system prompt and tool restrictions replace the default Claude Code persona for the entire session. This is useful for plugins that want to completely reshape the Claude Code experience — for example, a "security-first development" plugin where every interaction is filtered through a security lens.
          - heading "Important Notes" [level=3] [ref=e595]
          - list [ref=e596]:
            - listitem [ref=e597]:
              - text: The
              - code [ref=e598]: agent
              - text: value must match the
              - code [ref=e599]: name
              - text: field in one of the plugin's agent definitions (in
              - code [ref=e600]: agents/
              - text: ).
            - listitem [ref=e601]: Only one agent can be active at a time. If multiple plugins set this, the last one loaded wins.
            - listitem [ref=e602]: Users can override this by selecting a different agent during their session.
          - separator [ref=e603]
          - heading "Testing and Debugging Plugins" [level=2] [ref=e604]
          - heading "Loading a Plugin During Development" [level=3] [ref=e605]
          - paragraph [ref=e606]:
            - text: Use the
            - code [ref=e607]: "--plugin-dir"
            - text: "flag to load your plugin from a local directory:"
          - code [ref=e609]: claude --plugin-dir ./my-plugin
          - paragraph [ref=e610]: "You can load multiple plugins simultaneously:"
          - code [ref=e612]: claude --plugin-dir ./my-plugin --plugin-dir ./another-plugin
          - heading "Hot Reloading" [level=3] [ref=e613]
          - paragraph [ref=e614]:
            - text: After making changes to your plugin files, you do not need to restart Claude Code. Run the
            - code [ref=e615]: /reload-plugins
            - text: command inside the session to pick up changes immediately.
          - heading "Validation" [level=3] [ref=e616]
          - paragraph [ref=e617]: "Claude Code includes a built-in validation command that checks your plugin structure for errors:"
          - code [ref=e619]: claude plugin validate
          - paragraph [ref=e620]: "This checks:"
          - list [ref=e621]:
            - listitem [ref=e622]: Manifest format and required fields
            - listitem [ref=e623]: Command file syntax
            - listitem [ref=e624]: Agent frontmatter validity
            - listitem [ref=e625]: Skill SKILL.md format
            - listitem [ref=e626]: Hook configuration schema
            - listitem [ref=e627]: MCP and LSP JSON validity
          - heading "Debugging Tips" [level=3] [ref=e628]
          - list [ref=e629]:
            - listitem [ref=e630]:
              - paragraph [ref=e631]:
                - strong [ref=e632]: Start with validation
                - text: — Run
                - code [ref=e633]: claude plugin validate
                - text: before anything else. It catches structural errors immediately.
            - listitem [ref=e634]:
              - paragraph [ref=e635]:
                - strong [ref=e636]: Test commands first
                - text: — Commands are the simplest component. Get a basic command working before adding agents, skills, or hooks.
            - listitem [ref=e637]:
              - paragraph [ref=e638]:
                - strong [ref=e639]: Check hook matchers
                - text: — A common mistake is a typo in the matcher string.
                - code [ref=e640]: "\"Write|Edit\""
                - text: works;
                - code [ref=e641]: "\"write|edit\""
                - text: may not (tool names are case-sensitive).
            - listitem [ref=e642]:
              - paragraph [ref=e643]:
                - strong [ref=e644]: Watch token usage with MCP
                - text: — If your plugin adds MCP servers, monitor token consumption. Every server's tool definitions are loaded into context.
            - listitem [ref=e645]:
              - paragraph [ref=e646]:
                - strong [ref=e647]: Isolate subagent issues
                - text: — If a subagent is not behaving as expected, test its system prompt and tool restrictions independently by creating a temporary command that invokes just that agent.
            - listitem [ref=e648]:
              - paragraph [ref=e649]:
                - strong [ref=e650]:
                  - text: Use
                  - code [ref=e651]: /reload-plugins
                  - text: liberally
                - text: — After every change, reload. It is instant and avoids stale-state bugs.
          - heading "Development Workflow" [level=3] [ref=e652]
          - separator [ref=e654]
          - heading "Distribution" [level=2] [ref=e655]
          - heading "Official Marketplace" [level=3] [ref=e656]
          - paragraph [ref=e657]: "Submit your plugin to the official Claude Code marketplace:"
          - list [ref=e658]:
            - listitem [ref=e659]:
              - strong [ref=e660]: "Web submission:"
              - code [ref=e661]: claude.ai/settings/plugins/submit
              - text: or
              - code [ref=e662]: platform.claude.com/plugins/submit
            - listitem [ref=e663]: Your plugin goes through a review process before appearing in the public marketplace.
          - heading "Team Marketplaces" [level=3] [ref=e664]
          - paragraph [ref=e665]: "For internal or private plugins, create a team marketplace backed by a Git repository:"
          - code [ref=e667]: /plugin marketplace add user-or-org/repo-name
          - heading "Marketplace Repository Format" [level=3] [ref=e668]
          - paragraph [ref=e669]:
            - text: A marketplace repository contains a
            - code [ref=e670]: .claude-plugin/marketplace.json
            - text: "file that indexes the available plugins:"
          - code [ref=e671]: marketplace-repo/ ├── .claude-plugin/ │ └── marketplace.json ├── plugin-a/ │ ├── .claude-plugin/ │ │ └── plugin.json │ └── ... └── plugin-b/ ├── .claude-plugin/ │ └── plugin.json └── ...
          - paragraph [ref=e672]: This lets organizations maintain curated collections of plugins that team members can install from a single source.
          - heading "Versioning Strategy" [level=3] [ref=e673]
          - paragraph [ref=e674]: "Follow semantic versioning strictly:"
          - list [ref=e675]:
            - listitem [ref=e676]:
              - strong [ref=e677]: Patch
              - text: "(1.0.0 -> 1.0.1): Bug fixes, typo corrections in prompts"
            - listitem [ref=e678]:
              - strong [ref=e679]: Minor
              - text: "(1.0.0 -> 1.1.0): New commands, skills, or agents added (backward compatible)"
            - listitem [ref=e680]:
              - strong [ref=e681]: Major
              - text: "(1.0.0 -> 2.0.0): Breaking changes — renamed commands, removed features, restructured hooks"
          - separator [ref=e682]
          - heading "Real-World Examples from Official Plugins" [level=2] [ref=e683]
          - paragraph [ref=e684]: The 13 official Claude Code plugins demonstrate a range of patterns and complexity levels. Here are highlights showing how different components combine.
          - heading "code-review — Parallel Subagent Orchestration" [level=3] [ref=e685]:
            - code [ref=e686]: code-review
            - text: — Parallel Subagent Orchestration
          - list [ref=e687]:
            - listitem [ref=e688]:
              - strong [ref=e689]: "Pattern:"
              - text: One command dispatches to five parallel subagents.
            - listitem [ref=e690]:
              - strong [ref=e691]: "Components:"
              - code [ref=e692]: commands/
              - text: +
              - code [ref=e693]: agents/
            - listitem [ref=e694]:
              - strong [ref=e695]: "Key idea:"
              - text: Each subagent (logic, performance, security, style, documentation) runs on Sonnet in its own context window. Results are merged into a unified review.
            - listitem [ref=e696]:
              - strong [ref=e697]: "Lesson:"
              - text: Subagents are most powerful when each has a narrow, well-defined focus.
          - heading "commit-commands — Multi-Command Utility" [level=3] [ref=e698]:
            - code [ref=e699]: commit-commands
            - text: — Multi-Command Utility
          - list [ref=e700]:
            - listitem [ref=e701]:
              - strong [ref=e702]: "Pattern:"
              - text: Three related commands packaged together.
            - listitem [ref=e703]:
              - strong [ref=e704]: "Components:"
              - code [ref=e705]: commands/
              - text: only
            - listitem [ref=e706]:
              - strong [ref=e707]: "Commands:"
              - code [ref=e708]: /commit
              - text: ","
              - code [ref=e709]: /commit-push-pr
              - text: ","
              - code [ref=e710]: /clean_gone
            - listitem [ref=e711]:
              - strong [ref=e712]: "Lesson:"
              - text: Not every plugin needs agents or skills. A set of well-crafted commands can be highly valuable.
          - heading "hookify — Full Component Integration" [level=3] [ref=e713]:
            - code [ref=e714]: hookify
            - text: — Full Component Integration
          - list [ref=e715]:
            - listitem [ref=e716]:
              - strong [ref=e717]: "Pattern:"
              - text: Commands, an agent, and a skill working together.
            - listitem [ref=e718]:
              - strong [ref=e719]: "Components:"
              - code [ref=e720]: commands/
              - text: +
              - code [ref=e721]: agents/
              - text: +
              - code [ref=e722]: skills/
            - listitem [ref=e723]:
              - strong [ref=e724]: "Key idea:"
              - text: The skill auto-invokes when Claude detects hook-related work, while the command provides explicit hook creation workflows.
            - listitem [ref=e725]:
              - strong [ref=e726]: "Lesson:"
              - text: Skills and commands complement each other — skills for automatic, commands for explicit.
          - heading "feature-dev — Multi-Phase Workflow" [level=3] [ref=e727]:
            - code [ref=e728]: feature-dev
            - text: — Multi-Phase Workflow
          - list [ref=e729]:
            - listitem [ref=e730]:
              - strong [ref=e731]: "Pattern:"
              - text: A 7-phase development workflow with specialized agents at each phase.
            - listitem [ref=e732]:
              - strong [ref=e733]: "Components:"
              - code [ref=e734]: commands/
              - text: +
              - code [ref=e735]: agents/
              - text: "(7 agents: explorer, architect, implementer, tester, reviewer, etc.)"
            - listitem [ref=e736]:
              - strong [ref=e737]: "Key idea:"
              - text: Complex software development tasks are broken into phases, each handled by an expert agent.
            - listitem [ref=e738]:
              - strong [ref=e739]: "Lesson:"
              - text: For large workflows, define clear phases with hand-off points between agents.
          - heading "plugin-dev — Meta-Plugin" [level=3] [ref=e740]:
            - code [ref=e741]: plugin-dev
            - text: — Meta-Plugin
          - list [ref=e742]:
            - listitem [ref=e743]:
              - strong [ref=e744]: "Pattern:"
              - text: A plugin for building plugins.
            - listitem [ref=e745]:
              - strong [ref=e746]: "Components:"
              - code [ref=e747]: commands/
              - text: +
              - code [ref=e748]: agents/
              - text: +
              - code [ref=e749]: skills/
              - text: (7 expert skills)
            - listitem [ref=e750]:
              - strong [ref=e751]: "Command:"
              - code [ref=e752]: /plugin-dev:create-plugin
            - listitem [ref=e753]:
              - strong [ref=e754]: "Key idea:"
              - text: Seven specialized skills cover different aspects of plugin development (manifest creation, command writing, hook configuration, etc.).
            - listitem [ref=e755]:
              - strong [ref=e756]: "Lesson:"
              - text: Skills can encode deep domain expertise that Claude draws on automatically.
          - heading "security-guidance — Preventive Hooks" [level=3] [ref=e757]:
            - code [ref=e758]: security-guidance
            - text: — Preventive Hooks
          - list [ref=e759]:
            - listitem [ref=e760]:
              - strong [ref=e761]: "Pattern:"
              - text: A
              - code [ref=e762]: PreToolUse
              - text: hook that monitors every tool call for security risks.
            - listitem [ref=e763]:
              - strong [ref=e764]: "Components:"
              - code [ref=e765]: hooks/
              - text: only
            - listitem [ref=e766]:
              - strong [ref=e767]: "Key idea:"
              - text: Nine security patterns are checked before any tool executes. Issues are flagged before they become problems.
            - listitem [ref=e768]:
              - strong [ref=e769]: "Lesson:"
              - text: Hooks are ideal for guardrails — they run silently until something needs attention.
          - heading "frontend-design — Auto-Invoked Skill" [level=3] [ref=e770]:
            - code [ref=e771]: frontend-design
            - text: — Auto-Invoked Skill
          - list [ref=e772]:
            - listitem [ref=e773]:
              - strong [ref=e774]: "Pattern:"
              - text: A single skill that activates automatically for frontend work.
            - listitem [ref=e775]:
              - strong [ref=e776]: "Components:"
              - code [ref=e777]: skills/
              - text: only
            - listitem [ref=e778]:
              - strong [ref=e779]: "Key idea:"
              - text: Whenever Claude detects frontend-related tasks (HTML, CSS, React), the skill's design system rules are loaded automatically.
            - listitem [ref=e780]:
              - strong [ref=e781]: "Lesson:"
              - text: A single well-written skill can enforce consistency across an entire domain without user intervention.
          - heading "ralph-wiggum — Iterative Loops via Hooks" [level=3] [ref=e782]:
            - code [ref=e783]: ralph-wiggum
            - text: — Iterative Loops via Hooks
          - list [ref=e784]:
            - listitem [ref=e785]:
              - strong [ref=e786]: "Pattern:"
              - text: A
              - code [ref=e787]: Stop
              - text: hook that evaluates output and triggers re-runs.
            - listitem [ref=e788]:
              - strong [ref=e789]: "Components:"
              - code [ref=e790]: hooks/
              - text: only
            - listitem [ref=e791]:
              - strong [ref=e792]: "Key idea:"
              - text: When the main agent finishes, the hook decides whether the output is satisfactory. If not, it triggers another iteration.
            - listitem [ref=e793]:
              - strong [ref=e794]: "Lesson:"
              - text: Hooks on the
              - code [ref=e795]: Stop
              - text: event enable self-improving feedback loops.
          - separator [ref=e796]
          - heading "Migration from Standalone to Plugin" [level=2] [ref=e797]
          - paragraph [ref=e798]:
            - text: If you have existing customizations in your project's
            - code [ref=e799]: .claude/
            - text: directory, migrating to a plugin is straightforward.
          - heading "Step-by-Step Migration" [level=3] [ref=e800]
          - list [ref=e801]:
            - listitem [ref=e802]:
              - paragraph [ref=e803]:
                - strong [ref=e804]: Create the plugin structure
                - text: — Make a new directory with
                - code [ref=e805]: .claude-plugin/plugin.json
                - text: .
            - listitem [ref=e806]:
              - paragraph [ref=e807]:
                - strong [ref=e808]: Copy components
                - text: — Move
                - code [ref=e809]: commands/
                - text: ","
                - code [ref=e810]: agents/
                - text: ", and"
                - code [ref=e811]: skills/
                - text: directories from
                - code [ref=e812]: .claude/
                - text: to the plugin root.
            - listitem [ref=e813]:
              - paragraph [ref=e814]:
                - strong [ref=e815]: Migrate hooks
                - text: — Hooks in standalone mode live in
                - code [ref=e816]: settings.json
                - text: under the
                - code [ref=e817]: .claude/
                - text: directory. In a plugin, they move to
                - code [ref=e818]: hooks/hooks.json
                - text: . The format is the same; only the file location changes.
            - listitem [ref=e819]:
              - paragraph [ref=e820]:
                - strong [ref=e821]: Test
                - text: — Load the plugin with
                - code [ref=e822]: "--plugin-dir"
                - text: and verify everything works.
            - listitem [ref=e823]:
              - paragraph [ref=e824]:
                - strong [ref=e825]: Update references
                - text: — Commands are now namespaced.
                - code [ref=e826]: /review
                - text: becomes
                - code [ref=e827]: /my-plugin:review
                - text: . Update any documentation or team guides.
