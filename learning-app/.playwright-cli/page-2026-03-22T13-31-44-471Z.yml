          - heading "Plugin Architecture" [level=2] [ref=e66]
          - paragraph [ref=e67]:
            - text: A plugin is a directory that follows a specific layout. Claude Code discovers it through the
            - code [ref=e68]: .claude-plugin/
            - text: folder, reads the manifest, and then loads every other component — commands, agents, skills, hooks, MCP servers, LSP servers, and settings — from well-known paths relative to the plugin root.
          - heading "Directory Structure" [level=3] [ref=e69]
          - code [ref=e70]: "plugin-name/ ├── .claude-plugin/ │ └── plugin.json # Plugin metadata (the ONLY file inside .claude-plugin/) ├── commands/ # Slash commands ├── agents/ # Specialized subagents ├── skills/ # Agent Skills with SKILL.md files ├── hooks/ # Event handlers (hooks.json) ├── .mcp.json # MCP server configurations ├── .lsp.json # LSP server configurations ├── settings.json # Default settings └── README.md"
