          - code [ref=e261]: "--- name: code-review description: Reviews code for best practices and common bugs. Use when reviewing code, checking pull requests, or auditing changes. --- ## Code Review Instructions When reviewing code, follow these steps: 1. **Read the diff** — Use the Bash tool to run `git diff` or read the relevant files. 2. **Check for logic errors** — Look for off-by-one errors, null checks, and race conditions. 3. **Evaluate naming** — Are variables and functions named clearly? 4. **Assess test coverage** — Are edge cases tested? Provide findings in a structured table with columns: File, Line, Severity, Finding."
