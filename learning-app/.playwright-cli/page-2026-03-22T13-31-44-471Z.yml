          - paragraph [ref=e317]:
            - text: The official
            - code [ref=e318]: frontend-design
            - text: plugin ships a skill that auto-invokes whenever Claude detects frontend work (HTML, CSS, React components). The skill instructions guide Claude to follow specific design system rules, use particular component libraries, and maintain visual consistency — all without the user having to remember to ask.
          - separator [ref=e319]
          - heading "Subagents" [level=2] [ref=e320]
          - paragraph [ref=e321]: Subagents are specialized AI personalities that run in isolated context windows. They let you divide complex tasks among focused experts, each with their own system prompt, tool access, and even model selection.
          - heading "Why Subagents Matter" [level=3] [ref=e322]
          - paragraph [ref=e323]: "The main Claude Code conversation accumulates context over time. A long conversation means more tokens consumed and a higher chance of the model losing focus. Subagents solve this by:"
          - list [ref=e324]:
            - listitem [ref=e325]:
              - strong [ref=e326]: Isolating context
              - text: — Each subagent gets a fresh context window with only its system prompt and relevant data.
            - listitem [ref=e327]:
              - strong [ref=e328]: Restricting tools
              - text: — A security auditor subagent does not need file-writing tools. Limiting tools reduces risk and focuses the agent.
            - listitem [ref=e329]:
              - strong [ref=e330]: Enabling parallelism
              - text: — Multiple subagents can run simultaneously on different aspects of a task.
            - listitem [ref=e331]:
              - strong [ref=e332]: Choosing the right model
              - text: — A simple formatting task can use a faster, cheaper model while a complex analysis task uses the most capable one.
          - heading "Creating a Subagent" [level=3] [ref=e333]
          - paragraph [ref=e334]:
            - text: Subagents live in
            - code [ref=e335]: agents/
            - text: . Each agent is a markdown file with YAML frontmatter.
          - code [ref=e336]: agents/ ├── security-auditor.md ├── performance-reviewer.md └── documentation-writer.md
          - heading "Agent Definition Format" [level=3] [ref=e337]
          - code [ref=e339]: "--- name: security-auditor description: Analyzes code for security vulnerabilities and unsafe patterns tools: Read, Grep, Bash model: sonnet --- You are a security-focused code auditor. Your job is to find vulnerabilities in code. ## What to Look For - SQL injection - Cross-site scripting (XSS) - Insecure deserialization - Hardcoded secrets - Missing input validation - Improper error handling that leaks information ## Output Format For each finding, report: - **File and line number** - **Vulnerability type** (from OWASP Top 10 if applicable) - **Severity** (Critical / High / Medium / Low) - **Recommendation** for remediation"
          - heading "Frontmatter Fields" [level=3] [ref=e340]
