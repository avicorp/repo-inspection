        - generic [ref=e15]:
          - heading "Plugin Development Deep Dive" [level=1] [ref=e16]
          - paragraph [ref=e17]: Building plugins for Claude Code lets you package reusable workflows, specialized agents, automated hooks, and external tool integrations into a single distributable unit. This guide walks through every aspect of plugin development — from the directory structure and manifest configuration to testing, debugging, and publishing your plugin to a marketplace.
          - paragraph [ref=e18]: Whether you are automating code reviews, enforcing security policies, or wiring up external services, plugins give you a structured, versioned, shareable way to extend Claude Code far beyond what standalone configuration files can do.
          - separator [ref=e19]
          - heading "Why Plugins Exist" [level=2] [ref=e20]
          - paragraph [ref=e21]:
            - text: Before plugins, all customization lived inside a project's
            - code [ref=e22]: .claude/
            - text: "directory: slash commands, agents, skills, and hook definitions mixed together with the rest of the codebase. That approach works for personal workflows, but it has clear limitations:"
          - list [ref=e23]:
            - listitem [ref=e24]:
              - strong [ref=e25]: No versioning
              - text: — changes to your automation are not tracked separately from application code.
            - listitem [ref=e26]:
              - strong [ref=e27]: No sharing
              - text: — another developer cannot install your workflow with a single command.
            - listitem [ref=e28]:
              - strong [ref=e29]: No namespacing
              - text: — two teams using a
              - code [ref=e30]: /review
              - text: command will collide.
          - paragraph [ref=e31]:
            - text: Plugins solve all three problems. A plugin is a self-contained directory with a manifest, and Claude Code loads it as a first-class extension. Commands are namespaced (
            - code [ref=e32]: /plugin-name:command
            - text: ), versions follow semver, and distribution happens through marketplaces backed by Git repositories.
          - heading "Standalone vs Plugin at a Glance" [level=3] [ref=e33]
