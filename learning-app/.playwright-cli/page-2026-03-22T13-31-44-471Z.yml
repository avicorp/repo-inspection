          - heading "Commands (Slash Commands)" [level=2] [ref=e196]
          - paragraph [ref=e197]: Commands are the most visible part of a plugin. They give users explicit, on-demand workflows triggered by typing a slash command in the Claude Code prompt.
          - heading "Creating a Command" [level=3] [ref=e198]
          - paragraph [ref=e199]:
            - text: Each command is a markdown file inside the
            - code [ref=e200]: commands/
            - text: directory. The filename (minus the
            - code [ref=e201]: .md
            - text: extension) becomes the command name, namespaced under the plugin.
          - code [ref=e202]: "commands/ ├── review.md # Invoked as /plugin-name:review ├── fix.md # Invoked as /plugin-name:fix └── report/ └── summary.md # Invoked as /plugin-name:report:summary"
          - paragraph [ref=e203]: Subdirectories create nested command namespaces using the colon separator.
          - heading "Command File Format" [level=3] [ref=e204]
          - paragraph [ref=e205]: A command file is plain markdown. The content becomes the prompt that Claude Code executes when the user invokes the command.
          - code [ref=e207]: "Review the current Git diff for: 1. Logic errors 2. Security vulnerabilities 3. Performance issues Provide a summary with severity ratings."
