          - heading "Agent Skills" [level=2] [ref=e243]
          - paragraph [ref=e244]: Skills are instructions that Claude Code can automatically invoke based on the current task context — no slash command required. They are the "always-on" counterpart to the "on-demand" nature of commands.
          - heading "How Skills Work" [level=3] [ref=e245]
          - paragraph [ref=e247]:
            - text: Claude reads the
            - code [ref=e248]: description
            - text: field in every loaded skill's frontmatter. If the current task matches a skill's description, Claude automatically pulls in that skill's instructions — without the user explicitly asking.
          - heading "Creating a Skill" [level=3] [ref=e249]
          - paragraph [ref=e250]:
            - text: Skills live in
            - code [ref=e251]: skills/
            - text: . Each skill is a
            - strong [ref=e252]: subdirectory
            - text: containing a
            - code [ref=e253]: SKILL.md
            - text: file.
          - code [ref=e254]: skills/ ├── code-review/ │ └── SKILL.md ├── security-check/ │ └── SKILL.md └── accessibility-audit/ └── SKILL.md
          - heading "The SKILL.md Format" [level=3] [ref=e255]:
