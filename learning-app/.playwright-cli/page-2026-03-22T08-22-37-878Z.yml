            - listitem [ref=e69]:
              - strong [ref=e70]: Startup performance is a priority
              - text: "-- it appears in multiple releases"
          - paragraph [ref=e71]: When you see the same category (like memory optimization) appearing across consecutive releases, it signals a sustained engineering initiative, not a one-off fix.
          - heading "The Prefix Convention" [level=3] [ref=e72]
          - paragraph [ref=e73]: "Claude Code's changelog uses consistent prefixes that categorize entries:"
