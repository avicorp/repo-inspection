          - 'heading "Phase 1: Foundation (v0.2 Beta, 2023--2024)" [level=3] [ref=e201]'
          - paragraph [ref=e202]: "The beta phase established the core interaction model. Three foundational capabilities defined this era:"
          - list [ref=e203]:
            - listitem [ref=e204]:
              - strong [ref=e205]: Thinking mode
              - text: "-- the ability for the AI to reason step-by-step before acting, which later became a core differentiator for complex coding tasks"
            - listitem [ref=e206]:
              - strong [ref=e207]: "@-mentions"
              - text: "-- a natural language mechanism for referencing files, URLs, and other resources within prompts"
            - listitem [ref=e208]:
              - strong [ref=e209]: MCP (Model Context Protocol) support
              - text: "-- the standardized protocol for connecting Claude to external tools and data sources"
          - paragraph [ref=e210]: "These three features together created the Claude Code identity: an AI that thinks, references context, and connects to your existing toolchain."
          - 'heading "Phase 2: General Availability (v1.0, 2024)" [level=3] [ref=e211]'
          - paragraph [ref=e212]: The v1.0 release marked the transition from experimental beta to production-ready tool. The key milestone was shipping with the Sonnet 4 and Opus 4 model families, establishing Claude Code as a multi-model product where users choose between speed (Sonnet) and depth (Opus).
          - 'heading "Phase 3: Multi-Surface Expansion (v2.0, 2024--2025)" [level=3] [ref=e213]'
          - paragraph [ref=e214]: "This phase transformed Claude Code from a terminal-only tool into a multi-surface product:"
          - list [ref=e215]:
            - listitem [ref=e216]:
              - strong [ref=e217]: Native VS Code extension
              - text: "-- meeting developers where they already work"
            - listitem [ref=e218]:
              - strong [ref=e219]: Rewind feature
              - text: "-- allowing users to undo and replay AI actions, addressing trust and control concerns"
            - listitem [ref=e220]:
              - strong [ref=e221]: Plugin ecosystem
              - text: "-- opening the product to third-party extensibility"
          - paragraph [ref=e222]: The shift from "CLI tool" to "platform" happened here. The plugin ecosystem in particular signaled that the team was thinking about Claude Code as a foundation that others build on, not just a standalone product.
          - 'heading "Phase 4: Agent Intelligence (v2.1, 2025--2026)" [level=3] [ref=e223]'
          - paragraph [ref=e224]: "The current phase focuses on making Claude Code smarter about managing complex work:"
          - list [ref=e225]:
            - listitem [ref=e226]:
              - strong [ref=e227]: Agent Teams
              - text: "-- multiple specialized agents working together on different aspects of a task"
            - listitem [ref=e228]:
              - strong [ref=e229]: Auto-memory
              - text: "-- the system learns from your project and remembers context across sessions"
            - listitem [ref=e230]:
              - strong [ref=e231]: Advanced orchestration
              - text: "-- coordinating tool calls, background work, and multi-step operations"
          - paragraph [ref=e232]: This is the "AI that works like a team" phase, where individual tool use evolves into coordinated multi-agent workflows.
