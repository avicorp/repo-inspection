          - heading "Release Cadence Analysis" [level=2] [ref=e234]
          - heading "Versioning Pattern" [level=3] [ref=e235]
          - paragraph [ref=e236]: "Claude Code follows semantic versioning (major.minor.patch), but with a distinctive pattern:"
          - list [ref=e237]:
            - listitem [ref=e238]:
              - strong [ref=e239]: Major versions
              - text: (v1.0, v2.0) mark architectural shifts and are infrequent
            - listitem [ref=e240]:
              - strong [ref=e241]: Minor versions
              - text: (v2.1) represent feature epochs and last months
            - listitem [ref=e242]:
              - strong [ref=e243]: Patch versions
              - text: (v2.1.72 through v2.1.81) carry the actual week-to-week changes
          - paragraph [ref=e244]: The practical effect is that the patch number functions more like a build number than a traditional "bugfix-only" patch. Each patch release contains a mix of new features, improvements, and fixes.
          - heading "Frequency Analysis" [level=3] [ref=e245]
          - paragraph [ref=e247]:
            - strong [ref=e248]: 10 releases in 10 days
            - text: "(March 10--20, 2026) is an extremely aggressive cadence. Key observations:"
          - list [ref=e249]:
            - listitem [ref=e250]:
              - strong [ref=e251]: Daily releases are normal
              - text: "-- the team ships nearly every business day"
            - listitem [ref=e252]:
              - strong [ref=e253]: Multiple releases per day can happen
              - text: "-- v2.1.77 and v2.1.78 both shipped on March 17"
            - listitem [ref=e254]:
              - strong [ref=e255]: Weekend gaps exist
              - text: "-- no releases on March 15--16 (Saturday--Sunday), suggesting the team avoids weekend deploys"
            - listitem [ref=e256]:
              - strong [ref=e257]: The broader v2.1 pattern
              - text: averages roughly 2-week intervals between significant capability jumps, but patch releases ship continuously within those intervals
          - heading "What This Cadence Tells You" [level=3] [ref=e258]
          - paragraph [ref=e259]: "This release velocity is only possible with:"
          - list [ref=e260]:
            - listitem [ref=e261]:
              - strong [ref=e262]: Strong automated testing
              - text: "-- you cannot ship daily without CI catching regressions"
            - listitem [ref=e263]:
              - strong [ref=e264]: Feature flags or gradual rollout
              - text: "-- not every feature ships to all users simultaneously"
            - listitem [ref=e265]:
              - strong [ref=e266]: Automated changelog generation
              - text: "-- the public repository shows GitHub Actions committing CHANGELOG updates, confirming automation in the release pipeline"
            - listitem [ref=e267]:
              - strong [ref=e268]: High deployment confidence
              - text: "-- the team trusts their release process enough to ship features and fixes in the same release"
          - paragraph [ref=e269]: "For contributors, this means: your plugin or contribution will not wait months for a release. The pipeline moves fast."
