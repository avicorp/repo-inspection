              - text: "-- Features specific to the VS Code extension surface"
            - listitem [ref=e79]: No prefix -- Core CLI features and general improvements
          - paragraph [ref=e80]: This tagging system tells you the team thinks about the product in terms of distinct surfaces (CLI, VS Code, web) and treats security as a cross-cutting concern worthy of special attention.
