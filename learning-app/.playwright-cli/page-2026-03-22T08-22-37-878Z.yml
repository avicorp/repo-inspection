          - heading "Reading Between the Lines" [level=3] [ref=e60]
          - paragraph [ref=e61]: "A changelog entry like \"Memory reduction ~80MB on startup for large repos\" tells you several things at once:"
          - list [ref=e62]:
            - listitem [ref=e63]:
              - strong [ref=e64]: Users reported memory problems
              - text: "-- this fix did not appear from nowhere"
            - listitem [ref=e65]:
              - strong [ref=e66]: Large repos are a key use case
              - text: "-- the team optimizes for professional-scale projects"
            - listitem [ref=e67]:
              - strong [ref=e68]: The team measures memory precisely
