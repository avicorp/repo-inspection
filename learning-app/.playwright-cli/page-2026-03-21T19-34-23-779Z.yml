        - heading "The Plugin System" [level=2] [ref=e449]
        - paragraph [ref=e450]: The plugin ecosystem is the heart of the public repository and the primary extensibility mechanism for Claude Code. Understanding it is essential for anyone who wants to customize or extend the tool.
        - heading "What Is a Plugin?" [level=3] [ref=e451]
        - paragraph [ref=e452]: "A plugin is a self-contained package that adds new capabilities to Claude Code. It can provide any combination of:"
        - list [ref=e453]:
          - listitem [ref=e454]:
            - strong [ref=e455]: Commands
            - text: "-- slash commands the user can invoke (e.g.,"
            - code [ref=e456]: /commit
            - text: ","
            - code [ref=e457]: /commit-push-pr
            - text: )
          - listitem [ref=e458]:
            - strong [ref=e459]: Agents
            - text: "-- autonomous sub-agents that Claude Code can dispatch for specific tasks (e.g., parallel code review agents)"
          - listitem [ref=e460]:
            - strong [ref=e461]: Skills
            - text: "-- specialized capabilities that can be loaded on demand"
          - listitem [ref=e462]:
            - strong [ref=e463]: Hooks
            - text: "-- lifecycle callbacks that run at specific points in Claude Code's execution (e.g., before a commit, after a compaction)"
          - listitem [ref=e464]:
            - strong [ref=e465]: MCP servers
            - text: "-- external tool servers connected via the Model Context Protocol"
        - heading "Plugin Directory Structure" [level=3] [ref=e466]
        - paragraph [ref=e467]: "Every plugin follows a consistent layout:"
        - code [ref=e468]: "plugin-name/ ├── .claude-plugin/ │ └── plugin.json # Plugin metadata: name, description, version ├── commands/ # Slash commands (markdown or code files) ├── agents/ # Agent definitions for autonomous sub-tasks ├── skills/ # Specialized skill definitions ├── hooks/ # Lifecycle hook handlers ├── .mcp.json # MCP server configuration (optional) └── README.md # Plugin documentation"
        - paragraph [ref=e469]:
          - text: This structure is important because Claude Code uses it to discover and load plugins. The
          - code [ref=e470]: plugin.json
          - text: file is the entry point -- it tells Claude Code what the plugin provides and how to activate it.
