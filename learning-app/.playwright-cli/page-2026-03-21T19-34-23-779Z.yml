            - paragraph [ref=e632]:
              - strong [ref=e633]: security-guidance
              - text: "-- Installs hooks that remind Claude Code to consider security implications during code generation. This is a good example of how hooks can enforce organizational policies."
          - listitem [ref=e634]:
            - paragraph [ref=e635]:
              - strong [ref=e636]: hookify
              - text: "-- A meta-plugin that helps you create custom hooks for behavior control. Rather than writing hook configurations manually, hookify provides a guided workflow for defining when and how hooks fire."
