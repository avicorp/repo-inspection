        - heading "Key Takeaways" [level=2] [ref=e761]
        - paragraph [ref=e762]: "For a beginner approaching Claude Code, here are the essential concepts to internalize:"
        - list [ref=e763]:
          - listitem [ref=e764]:
            - paragraph [ref=e765]:
              - strong [ref=e766]: Claude Code is an agent, not a chatbot.
              - text: It does not just answer questions -- it reads your files, runs commands, and takes actions in your development environment.
          - listitem [ref=e767]:
            - paragraph [ref=e768]:
              - strong [ref=e769]: The public repository is the ecosystem, not the engine.
              - text: The core CLI is closed-source and distributed via installers. The open-source repository provides plugins, documentation, and community infrastructure.
          - listitem [ref=e770]:
            - paragraph [ref=e771]:
              - strong [ref=e772]: Plugins are the extension model.
              - text: Everything from git workflows to security policies to learning modes is implemented as a plugin. Understanding the plugin structure (
              - code [ref=e773]: commands/
              - text: ","
              - code [ref=e774]: agents/
              - text: ","
              - code [ref=e775]: skills/
              - text: ","
              - code [ref=e776]: hooks/
              - text: ) is the key to customizing Claude Code.
          - listitem [ref=e777]:
            - paragraph [ref=e778]:
              - strong [ref=e779]: Hooks enforce policies.
              - text: Unlike commands (which users invoke), hooks run automatically at lifecycle points. This makes them powerful for organizational standards.
          - listitem [ref=e780]:
            - paragraph [ref=e781]:
              - strong [ref=e782]: Multi-agent architecture is real.
              - text: Plugins like code-review dispatch multiple parallel agents, demonstrating that Claude Code supports sophisticated agentic patterns beyond simple request-response.
          - listitem [ref=e783]:
            - paragraph [ref=e784]:
              - strong [ref=e785]: The changelog is your roadmap.
              - text: With rapid iteration (versions 2.1.75 through 2.1.81 in the recent window alone), the changelog is the best way to track new capabilities, especially around context limits, permissions, and plugin features.
