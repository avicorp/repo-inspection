          - listitem [ref=e619]:
            - paragraph [ref=e620]:
              - strong [ref=e621]: feature-dev
              - text: "-- Implements a structured 7-phase feature development workflow. Instead of ad-hoc coding, it guides you through planning, implementation, testing, and delivery in an organized sequence."
          - listitem [ref=e622]:
            - paragraph [ref=e623]:
              - strong [ref=e624]: code-review
              - text: "-- Runs automated PR reviews using 5 parallel Sonnet agents. Each agent focuses on a different aspect of code quality, and results are synthesized into a unified review. This demonstrates the multi-agent architecture that Claude Code supports."
          - listitem [ref=e625]:
            - paragraph [ref=e626]:
              - strong [ref=e627]: pr-review-toolkit
              - text: "-- A comprehensive suite of PR review agents for deeper analysis, complementing the automated code-review plugin with more specialized review capabilities."
