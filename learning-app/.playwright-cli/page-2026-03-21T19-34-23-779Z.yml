        - paragraph [ref=e610]:
          - strong [ref=e611]: "Development Workflow Plugins:"
        - list [ref=e612]:
          - listitem [ref=e613]:
            - paragraph [ref=e614]:
              - strong [ref=e615]: commit-commands
              - text: "-- Automates the entire git workflow with commands like"
