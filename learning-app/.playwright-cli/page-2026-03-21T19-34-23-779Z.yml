        - 'heading "Claude Code: Agentic Coding Tool for the Terminal" [level=1] [ref=e89]'
        - paragraph [ref=e90]: Claude Code is Anthropic's official CLI-based agentic coding assistant. It lives inside your terminal, understands your entire codebase, and helps you write, review, and ship code faster through natural language commands. Rather than switching between a chat window and your editor, Claude Code meets developers where they already work -- the command line -- and acts as an autonomous agent capable of reading files, running commands, managing git workflows, and coordinating multi-step development tasks.
        - paragraph [ref=e91]: "This document provides a comprehensive overview of the Claude Code public repository: its purpose, architecture, plugin ecosystem, key technologies, and how to get involved as a contributor or user."
        - separator [ref=e92]
        - heading "Purpose and Mission" [level=2] [ref=e93]
        - heading "What Problem Does Claude Code Solve?" [level=3] [ref=e94]
        - paragraph [ref=e95]: "Modern software development involves an enormous amount of routine work: writing boilerplate, reviewing pull requests, navigating unfamiliar codebases, committing and pushing changes, resolving merge conflicts, and explaining legacy code. These tasks are repetitive, context-heavy, and time-consuming."
        - paragraph [ref=e96]: "Claude Code addresses this by embedding an AI agent directly into the developer's terminal workflow. Instead of copy-pasting code into a web chat, you interact with Claude Code in the same environment where you already write and run code. It can:"
        - list [ref=e97]:
          - listitem [ref=e98]:
            - strong [ref=e99]: Execute routine tasks
            - text: "-- scaffold files, run tests, manage dependencies"
          - listitem [ref=e100]:
            - strong [ref=e101]: Explain complex code
            - text: "-- break down unfamiliar functions, trace call chains, summarize modules"
          - listitem [ref=e102]:
            - strong [ref=e103]: Handle git workflows
            - text: "-- commit, push, create pull requests, review diffs"
          - listitem [ref=e104]:
            - strong [ref=e105]: Reason about your codebase
            - text: "-- read project structure, understand dependencies, suggest changes in context"
